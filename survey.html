<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>독일어 수강 신청 | deutschprofis</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
      background: linear-gradient(to bottom, #eaf2ff, #ffffff);
      color: #111827;
    }

    .wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      color: #6b7280;
      font-size: 14px;
    }

    form {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    label {
      font-size: 14px;
      font-weight: 600;
    }

    input, select, textarea {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 14px;
    }

    textarea {
      resize: none;
      height: 100px;
    }

    button {
      margin-top: 10px;
      padding: 14px;
      background: #111827;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #000;
    }
  </style>
</head>

<body>

  <div class="wrap">
    <h1>독일어 수강 신청</h1>
    <p>아래 정보를 입력하시면 카카오톡 문의 메시지가 자동으로 생성됩니다.</p>

    <form id="form">

      <div>
        <label>이름</label>
        <input type="text" id="name" required />
      </div>

      <div>
        <label>연락처</label>
        <input type="text" id="contact" required />
      </div>

      <div>
        <label>희망 수업</label>
        <select id="class">
          <option>1:1 개인 과외</option>
          <option>B1 그룹반</option>
          <option>B2 그룹반</option>
          <option>상담 후 결정</option>
        </select>
      </div>

      <div>
        <label>현재 독일어 수준</label>
        <select id="level">
          <option>A1</option>
          <option>A2</option>
          <option>B1</option>
          <option>B2</option>
          <option>C1</option>
        </select>
      </div>

      <div>
        <label>추가 요청 사항</label>
        <textarea id="message"></textarea>
      </div>

      <button type="submit">카카오톡으로 문의하기</button>

    </form>
  </div>

  <script>
    document.getElementById("form").addEventListener("submit", function(e) {
      e.preventDefault();

      const name = document.getElementById("name").value;
      const contact = document.getElementById("contact").value;
      const lesson = document.getElementById("class").value;
      const level = document.getElementById("level").value;
      const message = document.getElementById("message").value;

      const text =
`[독일어 수강 문의]
이름: ${name}
연락처: ${contact}
희망 수업: ${lesson}
현재 수준: ${level}
추가 요청: ${message}`;

      navigator.clipboard.writeText(text);

      alert("문의 내용이 복사되었습니다. 카카오톡으로 이동합니다.");

      window.open("https://open.kakao.com/o/sBxAfATd", "_blank");
    });
  </script>

</body>
</html>
