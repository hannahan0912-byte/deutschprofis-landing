<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수강 신청 | deutschprofis</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
      background: linear-gradient(to bottom, #eaf2ff, #ffffff);
      color: #111827;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 50px 20px;
    }

    .card {
      background: white;
      border-radius: 30px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      border: 1px solid #e5e7eb;
    }

    h1 {
      font-size: 30px;
      margin-bottom: 10px;
    }

    .sub {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #374151;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      font-size: 14px;
      transition: 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #2563eb;
    }

    textarea {
      height: 100px;
      resize: none;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 15px;
      border-radius: 14px;
      border: none;
      background: #111827;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #000;
      transform: translateY(-1px);
    }

    .notice {
      font-size: 12px;
      color: #6b7280;
      margin-top: 12px;
      text-align: center;
    }

  </style>
</head>

<body>

  <div class="wrap">
    <div class="card">

      <h1>독일어 수강 신청</h1>
      <div class="sub">
        아래 정보를 입력하시면 문의 메시지가 자동 생성됩니다.
      </div>

      <form id="form">

        <div class="form-group">
          <label>이름</label>
          <input type="text" id="name" required>
        </div>

        <div class="form-group">
          <label>연락처</label>
          <input type="text" id="contact" required>
        </div>

        <div class="form-group">
          <label>희망 수업</label>
          <select id="class">
            <option>1:1 개인 과외</option>
            <option>B1 그룹반</option>
            <option>B2 그룹반</option>
            <option>상담 후 결정</option>
          </select>
        </div>

        <div class="form-group">
          <label>현재 독일어 수준</label>
          <select id="level">
            <option>A1</option>
            <option>A2</option>
            <option>B1</option>
            <option>B2</option>
            <option>C1</option>
          </select>
        </div>

        <div class="form-group">
          <label>추가 요청 사항</label>
          <textarea id="message"></textarea>
        </div>

        <button type="submit">카카오톡으로 문의하기</button>

        <div class="notice">
          작성 후 자동으로 카카오톡으로 이동합니다
        </div>

      </form>

    </div>
  </div>

  <script>
    document.getElementById("form").addEventListener("submit", function(e) {
      e.preventDefault();

      const name = document.getElementById("name").value;
      const contact = document.getElementById("contact").value;
      const lesson = document.getElementById("class").value;
      const level = document.getElementById("level").value;
      const message = document.getElementById("message").value;

      const text =
`[독일어 수강 문의]
이름: ${name}
연락처: ${contact}
희망 수업: ${lesson}
현재 수준: ${level}
추가 요청: ${message}`;

      navigator.clipboard.writeText(text);

      alert("문의 내용이 복사되었습니다!");

      window.open("https://open.kakao.com/o/sBxAfATd", "_blank");
    });
  </script>

</body>
</html>
